name: Instagram Ingestion

on:
  schedule:
    # Runs every 12 hours — at 00:00 and 12:00 UTC
    - cron: "0 0,12 * * *"
  workflow_dispatch:   # allows manual trigger from GitHub UI

jobs:
  ingest:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('topic_intelligence_engine/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        working-directory: topic_intelligence_engine
        run: pip install -r requirements.txt

      - name: Run Instagram ingestion
        working-directory: topic_intelligence_engine
        env:
          APIFY_API_KEY: ${{ secrets.APIFY_API_KEY }}
          USE_MOCK: "false"
          EXCEL_OUTPUT_PATH: "data/instagram_posts.xlsx"
        run: python run_ingestion.py

      - name: Commit and push updated Excel file
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add topic_intelligence_engine/data/instagram_posts.xlsx
          # Only commit if the file actually changed
          git diff --cached --quiet || git commit -m "data: update Instagram posts [$(date -u '+%Y-%m-%d %H:%M UTC')] [skip ci]"
          git push
